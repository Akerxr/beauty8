<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE - Beauty Center</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-black: rgba(15, 15, 15, 0.85);
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa7c11;
            --text-white: #ffffff;
            --transition-smooth: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-image: url('IMG-9014.WEBP');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            overflow-x: hidden;
            /* تم إزالة الطبقة المظلمة لتبقى الخلفية موحدة بالكامل */
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .center-logo {
            width: 140px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        /* شريط الأيقونات السريعة تحت اللوجو */
        .quick-icons-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            background: rgba(15, 15, 15, 0.6);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        .quick-icon-link {
            color: var(--gold-primary);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .quick-icon-link:hover {
            color: var(--gold-light);
            transform: scale(1.15);
        }

        .quick-icon-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .buttons-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* صندوق الزرار الذكي المحتوي على التأثير الدائري */
        .animated-border-box {
            position: relative;
            width: 100%;
            height: 60px;
            background: #000000;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* تعديل الأبعاد والـ الموضع هنا ليغطي كامل محيط الزرار العريض أثناء الدوران */
        .animated-border-box::before {
            content: '';
            position: absolute;
            width: 250%;
            height: 500%;
            top: -200%;
            left: -75%;
            background: conic-gradient(transparent, var(--gold-primary), var(--gold-light), transparent 60%);
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* الزرار الفعلي جوه الصندوق */
        .btn-luxury-premium {
            position: absolute;
            inset: 2px;
            background: linear-gradient(135deg, #151515 0%, #050505 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--gold-primary);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            z-index: 2;
            transition: var(--transition-smooth);
            border: none !important;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-luxury-premium svg {
            width: 20px;
            height: 20px;
            fill: var(--gold-primary);
            transition: var(--transition-smooth);
        }

        .animated-border-box:active {
            transform: scale(0.98);
        }

        .btn-luxury-premium:hover {
            color: var(--gold-light);
        }
        
        .btn-luxury-premium:hover svg {
            fill: var(--gold-light);
            transform: scale(1.1);
        }

        /* نصوص نيون بيضاء وبارزة وكبيرة تحت الأزرار */
        .sub-btn-text {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7), 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .brand-phrase {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            color: var(--gold-light);
            letter-spacing: 1px;
            margin-top: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .brand-phrase::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold-primary), transparent);
            margin: 12px auto 0 auto;
        }
    </style>
</head>
